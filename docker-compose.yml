
# ─────────────────────────────────────────────────────────────────────────────
# Cloud Infrastructure Threat Surface Mapper
# Local Docker Compose Stack
# ─────────────────────────────────────────────────────────────────────────────

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  scan_artifacts:
  terraform_state:
  reports:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-threatmapper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-threatmapper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threatmapper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:15432:5432"  # localhost only (15432 to avoid conflict with local PostgreSQL)

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: tm_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "127.0.0.1:17474:7474"  # Neo4j browser (localhost only, 17474 to avoid conflicts)
      - "127.0.0.1:17687:7687"  # Bolt protocol (localhost only, 17687 to avoid conflicts)

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:16379:6379"  # localhost only (16379 to avoid conflict with local Redis)

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tm_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-threatmapper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-threatmapper}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./backend:/app
      - scan_artifacts:/app/artifacts
      - reports:/app/reports
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "127.0.0.1:18000:8000"  # localhost only (18000 to avoid conflict with other services)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Worker (Celery) ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: tm_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-threatmapper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-threatmapper}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      AWS_CONFIG_FILE: /root/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /root/.aws/credentials
    volumes:
      - ./worker:/app
      - scan_artifacts:/app/artifacts
      - terraform_state:/app/terraform_state
      - reports:/app/reports
      # AWS credentials (read-only mount)
      - ~/.aws:/root/.aws:ro
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q scans,default,graph,ai,sandbox,testing

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: tm_beat
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./worker:/app
    networks:
      - backend_net
    depends_on:
      - redis
      - worker
    command: celery -A app.celery_app beat --loglevel=info

  # ── Frontend (React) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tm_frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allow frontend container to reach backend on host
    environment:
      VITE_API_URL: http://host.docker.internal:18000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - frontend_net
    depends_on:
      - backend
    ports:
      - "127.0.0.1:13000:3000"  # localhost only (13000 to avoid conflict with other dev servers)
    command: npm run dev -- --host 0.0.0.0 --port 3000
